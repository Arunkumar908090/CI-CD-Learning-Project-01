name: Env-secrets and Variables learning side

on:
    push:

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:

          - name: Script for Checking Machine
            run: echo "My Machine runs successfully!"

          - name: Env setup
            env:
                APP_ID: ${{ vars.APP_ID }}
                APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
            run: echo "My $APP_ID runs successfully and my $APP_PASSWORD Hides Successfully!"