name: Env-secrets and Variables learning side

on:
    push:
        
steps:
  - name: Demo file Creation
    run: |
       mkdir demo-app
       echo "my sample folder" >demo-app/demo.txt

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:

          - name: Script for Checking Machine
            run: echo "My Machine runs successfully!"

          - name: Env setup
            env:
                APP_ID: ${{ vars.APP_ID }}
                APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
            run: echo "My $APP_ID runs successfully and my $APP_PASSWORD Hides Successfully!"

          - name: Upload Demo files and folders
            uses: actions/upload-artifact@v7
            with:
                name: demo-artifacts-folder
                path: .
    
    test:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Run Test
              run: echo "Test Job"
    
    Explore-Github-Actions:
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Run Github services 
              run: |
                  echo "The job triggered to ${{ github.event_name }}" >demo-app/demo.txt
                  echo "The job running on ${{ runner.os }}" >demo-app/demo.txt
                  echo "The name of branch is ${{ github.ref }}" >demo-app/demo.txt
                  echo "The repository ${{ github.repository }} clone successfully" >demo-app/demo.txt
                  echo "The workspace is ${{ github.workspace}}" >demo-app/demo.txt
                  echo "The job status is now ${{ job.status }}" >demo-app/demo.txt