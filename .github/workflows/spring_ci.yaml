name: Setup for Spring Boot Application for AWS EKS

on:
    push:

jobs:
    build-steps-sample:
        runs-on: ubuntu-latest
        
        steps:
          - name: Check the Code
            run: echo "To Check the Code"

          - name: Setup Environment for JDK APP
            run: echo ""

          - name: Build and Test App
            run: echo ""

          - name: Upload Test Samples
            run: echo ""

    run-workflow:
        runs-on: ubuntu-latest
        needs: build-steps-sample
        
        steps:
          - name: Check the Code
            uses: actions/checkout@v6

          - name: Setup Environment for JDK APP
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' 
                java-version: '21'

          - name: Build and Test App
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean verify

          - name: Verify the reports
            uses: actions/upload-artifact@v7
            with: 
                name: test-reports
                path: docker/app1-hello/springboot/hello-spring/target/surefire-reports
                
    docker-build-image:
        runs-on: ubuntu-latest
        needs: run-workflow
        
        steps:
          - name: Check the Code
            uses: actions/checkout@v6

          - name: Setup Environment for JDK APP
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' 
                java-version: '21'

          - name: Build and Test JAR App
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean package -DskipTests

          - name: Docker Login
            uses: docker/login-action@v4
            with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

          - name: To Build and Push Docker Images
            uses: docker/build-push-action@v7
            with:
                context: docker/app1-hello/springboot/hello-spring
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USERNAME }}/hello-spring:latest
                    ${{ vars.DOCKERHUB_USERNAME }}/hello-spring:${{ github.sha }}

            
    upload-aws-eks:
          runs-on: ubuntu-latest
          needs: docker-build-image
          
          steps:
            - name: Check the Code
              uses: actions/checkout@v6

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1

            - name: Setup Kubectl
              uses: azure/setup-kubectl@v4
             
            - name: Update KubeConfig for EKS
              run: |
                aws eks update-kubeconfig \
                --name hello-spring-app \
                --region ap-south-1

            - name: Verify Connection
              run: kubectl get nodes

            - name: Deploy to AWS
              run: kubectl apply -f docker/k8s/deployment.yaml            