apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-site-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-site-d
  template:
    metadata:
      labels:
        app: simple-site-d
    spec:
      containers:
      - name: simple-site-d
        image: nginx
        # env:
        #   - name: APP_ID
        #     value: "This is sample node application"
        #   - name: APP_PASSWORD
        #     value: "YXJ1bmt1bWFy"
        
        env:
          - name: APP_ID
            valueFrom:
              configMapKeyRef:
                name: myapp-configuration
                key: APP_ID
          - name: APP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysecret-configuration
                key: APP_PASSWORD       
        ports:
        - containerPort: 80
---

apiVersion: v1
kind: Service
metadata:
  name: simple-site-service-image
spec:
  type: NodePort
  selector:
    app: simple-site-d
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30086