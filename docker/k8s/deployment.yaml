apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-spring-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-spring
  template:
    metadata:
      labels:
        app: hello-spring
    spec:
      containers:
      - name: hello-spring
        image: arunkumar9080/hello-spring:latest
        imagePullPolicy: Always
        # env:
        #   - name: APP_ID
        #     value: "This is sample node application"
        #   - name: APP_PASSWORD
        #     value: "YXJ1bmt1bWFy"
        
        # env:
        #   - name: APP_ID
        #     valueFrom:
        #       configMapKeyRef:
        #         name: myapp-configuration
        #         key: APP_ID
        #   - name: APP_PASSWORD
        #     valueFrom:
        #       secretKeyRef:
        #         name: mysecret-configuration
        #         key: APP_PASSWORD       
        ports:
        - containerPort: 8080
---

apiVersion: v1
kind: Service
metadata:
  name: hello-spring-service
spec:
  type: LoadBalancer
  selector:
    app: hello-spring
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
